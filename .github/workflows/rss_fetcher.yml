name: 📰 RSS Berita Indonesia — Auto Fetcher

on:
  schedule:
    - cron: "0 * * * *"   # Setiap jam tepat
  workflow_dispatch:        # Bisa dijalankan manual juga

jobs:
  fetch-rss:
    name: Fetch & Push RSS
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: 🔄 Pull & Rebase (anti-conflict)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || echo "Tidak ada perubahan untuk di-rebase"

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 🚀 Run RSS fetcher
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python fetch_rss.py

      - name: 💾 Commit & push data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update berita RSS — run #${{ github.run_number }}"
          file_pattern: data/*.json
